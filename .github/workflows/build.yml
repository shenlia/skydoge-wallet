name: Build APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get commit info
        id: commit
        run: |
          echo "short_sha=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Create Flutter project
        run: |
          rm -rf skydoge_wallet
          flutter create --org com.skydoge --project-name skydoge_wallet --platforms android,ios skydoge_wallet

      - name: Copy source files
        run: |
          rm -rf skydoge_wallet/lib
          cp -r skydoge_wallet/lib skydoge_wallet/lib.bak 2>/dev/null || true
          rm -rf skydoge_wallet/lib
          cp -r lib skydoge_wallet/
          cp pubspec.yaml skydoge_wallet/

      - name: Update Android SDK
        run: |
          if [ -f "skydoge_wallet/android/app/build.gradle" ]; then
            sed -i 's/compileSdk = 34/compileSdk = 35/' skydoge_wallet/android/app/build.gradle
          fi

      - name: Get dependencies
        run: |
          cd skydoge_wallet
          flutter pub get

      - name: Build debug APK
        run: |
          cd skydoge_wallet
          flutter build apk --debug

      - name: Build release APK
        run: |
          cd skydoge_wallet
          flutter build apk --release

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          cp skydoge_wallet/build/app/outputs/flutter-apk/app-debug.apk artifacts/
          cp skydoge_wallet/build/app/outputs/flutter-apk/app-release.apk artifacts/

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ steps.commit.outputs.short_sha }}
          path: artifacts/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ steps.commit.outputs.short_sha }}
          path: artifacts/app-release.apk
          retention-days: 90

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/app-release.apk
            artifacts/app-debug.apk
          body: |
            ## Skydoge Wallet APK Build
            
            **Build Version**: ${{ steps.commit.outputs.short_sha }}
            **Commit**: ${{ github.sha }}
            
            ### Downloads
            - `app-release.apk` - Production build
            - `app-debug.apk` - Debug build
            
            ### Installation
            1. Download the release APK
            2. Enable "Install from unknown sources" in device settings
            3. Install and enjoy!
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
