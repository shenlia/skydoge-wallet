name: Build APK

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone submodule
        run: |
          git submodule update --init --recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Get dependencies cache
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Build Debug APK
        run: flutter build apk --debug
        if: github.event_name == 'pull_request'

      - name: Build Release APK
        run: flutter build apk --release
        if: github.event_name != 'pull_request'

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
        if: github.event_name == 'pull_request'

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
        if: github.event_name != 'pull_request'

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Skydoge Wallet v${{ github.ref_name }}

            ### Changes
            - 0.01% mandatory donation
            - WIF private key import
            - Official Skydoge chain parameters
            - Chinese language support
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  android-sign:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Create Signed APK
        run: |
          echo "Debug APK built successfully"
          ls -la app-release.apk

      - name: Upload Signed APK
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ env.UPLOAD_ASSET_URL }}
          asset_path: ./app-release.apk
          asset_name: skydoge-wallet-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive
