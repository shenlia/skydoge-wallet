name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone submodule (skydoge_wallet)
        run: |
          if [ -d "skydoge_wallet" ]; then
            echo "skydoge_wallet directory exists"
          else
            echo "No submodule needed"
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd skydoge_wallet
          flutter pub get

      - name: Get Flutter dependencies (root)
        run: |
          if [ -f "pubspec.yaml" ]; then
            flutter pub get
          fi

      - name: Build debug APK
        run: |
          cd skydoge_wallet
          flutter build apk --debug

      - name: Build release APK
        run: |
          cd skydoge_wallet
          flutter build apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: skydoge_wallet/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: skydoge_wallet/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: skydoge_wallet/build/app/outputs/flutter-apk/app-release.apk
          body: |
            ## Skydoge Wallet Release APK
            
            Download and install this APK on your Android device.
            
            **Note**: Enable "Install from unknown sources" in your device settings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
